<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Museos Andalucía</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light d-flex align-items-center full-vh">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">
          <h3 class="text-center mb-4 fw-bold text-success">Crear Cuenta</h3>

          <div th:if="${param.error}" class="alert alert-danger text-center">
            Ese correo ya está registrado.
          </div>

          <form th:action="@{/registro}" method="post">
            <div class="mb-3">
              <label for="email" class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" id="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Registrarse</button>
          </form>

          <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-muted text-decoration-none">&larr; Volver al Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
